name: Create a new release

on:
  workflow_dispatch:
    inputs:
      devBuildTag:
        description: "Custom tag for test release"
        required: false

jobs:
  pre-commit:
    if: github.ref == 'refs/heads/main'
    name: Run pre-commit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Run pre-commit checks
        run: poetry run pre-commit run -a

  test:
    if: github.ref == 'refs/heads/main'
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Run tests
        run: poetry run pytest

  release:
    if: github.ref == 'refs/heads/main'
    name: Create release
    runs-on: ubuntu-latest
    needs: [test, pre-commit]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: eu-west-1
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true

      - name: Install Python dependencies
        run: poetry install --no-interaction

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "21"

      - name: Install Node dependencies
        run: npm install --include=dev

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Ensure release scripts are executable
        run: chmod +x scripts/build-and-push-to-ecr.sh scripts/release-publish.sh

      - name: Semantic Release
        if: github.event.inputs.devBuildTag == ''
        run: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.CI_USER_PAT }}
          POETRY_PYPI_TOKEN_PYPI: ${{ secrets.PYPI_API_TOKEN }}
          AWS_REGION: eu-west-1
          AWS_ACCOUNT_ID: "141239391012"

      - name: Dev Release
        if: github.event.inputs.devBuildTag != ''
        run: ./scripts/build-and-push-to-ecr.sh "DEV_BUILD_TAG=${{ github.event.inputs.devBuildTag }}"
        env:
          AWS_REGION: eu-west-1
          AWS_ACCOUNT_ID: "141239391012"
